name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            artifact: workflow-lock_darwin_amd64
          - goos: darwin
            goarch: arm64
            artifact: workflow-lock_darwin_arm64
          - goos: linux
            goarch: amd64
            artifact: workflow-lock_linux_amd64
          - goos: linux
            goarch: arm64
            artifact: workflow-lock_linux_arm64
          - goos: windows
            goarch: amd64
            artifact: workflow-lock_windows_amd64.exe
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o dist/${{ matrix.artifact }} ./cmd/workflow-lock
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  github-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        run: sha256sum dist/* > dist/SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
